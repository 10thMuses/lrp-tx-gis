- id: tax_abatements
  file: combined_points.csv
  geom: point
  group: Permits
  label: Property Tax Abatements (Ch.312 / LDAD, new or expansion)
  description: 'County-level property tax abatements for new or expanded facilities. Chapter 312 reinvestment zones and Local Development Agreements (HB 5 / SB 1340 successors to the sunsetted Ch.313).'
  color: '#dc2626'
  default_on: false
  radius: 4
  popup:
  - name
  - county
  - commissioned
  - technology
  - mw
  - capacity
  - use
  - sector
  - project
  - poi
  popup_labels:
    name: Applicant
    county: County
    commissioned: Approved date
    technology: Project type
    mw: Project MW
    capacity: Capex ($M)
    use: Abatement schedule
    sector: Taxing entities
    project: Reinvestment zone
    poi: Agenda URL
  filterable_fields:
  - {field: county, type: categorical, label: County}
  - {field: technology, type: categorical, label: Project type}
  - {field: commissioned, type: text, label: Approved date}
  - {field: mw, type: numeric, label: Project MW}
  - {field: capacity, type: numeric, label: Capex ($M)}
  tippecanoe:
  - -Z0
  - -z14
- id: fcc_fiber_coverage
  file: fcc_fiber_coverage.geojson
  geom: fill
  group: Telecom
  label: Fiber coverage (FCC BDC, Jun 2025)
  color: '#0891b2'
  fill_opacity: 0.55
  default_on: false
  min_zoom: 6
  color_steps:
    field: fiber_provider_count
    default: '#cbd5e1'
    stops:
      - [1, '#67e8f9']
      - [3, '#0891b2']
  popup:
  - bsl_count
  - fiber_served_bsls
  - fiber_underserved_bsls
  - fiber_unserved_bsls
  - fiber_provider_count
  - as_of_date
  popup_labels:
    bsl_count: BSLs (total)
    fiber_served_bsls: Fiber served (≥100/20)
    fiber_underserved_bsls: Fiber underserved (25/3–<100/20)
    fiber_unserved_bsls: Fiber unserved
    fiber_provider_count: Fiber providers
    as_of_date: As-of
  tippecanoe:
  - -Z6
  - -z12
  - --coalesce-densest-as-needed
  - --simplification=8
