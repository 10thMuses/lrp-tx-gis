layers:
- id: counties
  file: combined_geoms.geojson
  geom: line
  group: Reference
  label: Counties (Outline)
  color: '#ffffff'
  line_width: 1
  default_on: true
  popup:
  - NAME
  tippecanoe:
  - -zg
  - --extend-zooms-if-still-dropping
  - --simplification=8
- id: cities
  file: combined_points.csv
  geom: point
  group: Reference
  label: Cities
  color: '#1e293b'
  default_on: true
  popup:
  - name
  radius: 4
  tippecanoe:
  - -zg
- id: caramba_north
  file: combined_geoms.geojson
  geom: fill
  group: Land & Deal
  label: Caramba North (1,300 ac)
  color: '#2E7D32'
  fill_opacity: 0.25
  default_on: true
  popup:
  - Name
  - arableLandSize
  - cropType
  tippecanoe:
  - -zg
- id: mpgcd_zone1
