- id: counterparty_assets
  file: combined_geoms.geojson
  geom: fill
  group: Land & Deal
  label: Counterparty asset boundaries (APPROXIMATE)
  description: 'R2.5 Part 5 — counterparty land + datacenter polygons for the
    Hanwha legal-defense framing. Pacifico GW Ranch is in its own gw_ranch
    layer (already shipped); the four sites here are net-new approximated
    boundaries centered on public-record reference points and sized to
    disclosed acreage. TCEQ CRPUB + Ch.312/313 cross-reference yielded no
    clean coordinates for these specific sites (Microsoft Reeves, Core
    Scientific Pecos, Belding Farms/Cockrell, Fort Stockton Holdings), so
    every feature carries boundary_confidence=approximated and a source_url.'
  color: '#92400e'
  fill_opacity: 0.18
  stroke_color: '#78350f'
  stroke_width: 2
  default_on: false
  popup:
  - name
  - counterparty
  - primary_use
  - disclosed_acreage
  - capacity_mw_if_applicable
  - status
  - county
  - boundary_confidence
  - source_url
  popup_labels:
    name: Site
    counterparty: Counterparty
    primary_use: Use
    disclosed_acreage: Disclosed acres
    capacity_mw_if_applicable: Capacity (MW)
    status: Status
    county: County
    boundary_confidence: Boundary
    source_url: Source URL
  filterable_fields:
  - field: counterparty
    type: categorical
    label: Counterparty
  - field: primary_use
    type: categorical
    label: Use
  - field: county
    type: categorical
    label: County
  - field: boundary_confidence
    type: categorical
    label: Boundary confidence
  tippecanoe:
  - -Z0
  - -z14
- id: permits_permian6
  file: data/permits_permian6.csv
  geom: point
  group: Permits
  label: Permits (RRC W-1, 6-county Permian)
  description: "RRC drilling permits with WGS84 coordinates and approved depth. Source dbf-EOM monthly snapshots (`daf420.dat.MM-DD-YYYY`), 2018-01 through current. Subject (sale area) \u2014 Pecos, Reeves, Ward. Active Permian peer (boom area) \u2014 Midland, Martin, Reagan. Each permit row carries `county_role` \u2208 {subject, peer}. Records without a parseable total_depth are excluded at the parser stage per R2-2."
  color: '#dc2626'
  default_on: false
  min_zoom: 6
  radius: 3
  popup:
  - permit_no
  - api_no
  - county_name
  - county_role
  - district
  - lease_name
  - well_no
  - operator_name
  - submitted_date
  - approved_date
  - permit_year
  - status
  - wellbore_profile
  - filing_purpose
  - oil_gas
  - total_depth
  popup_labels:
    permit_no: Permit
    api_no: API
    county_name: County
    county_role: Role
    district: District
    lease_name: Lease
    well_no: Well
    operator_name: Operator
    submitted_date: Submitted
    approved_date: Approved
    permit_year: Year
    status: Status
    wellbore_profile: Wellbore profile
    filing_purpose: Filing purpose code
    oil_gas: Oil/Gas
    total_depth: Total depth (ft)
  filterable_fields:
  - field: county_name
    type: categorical
    label: County
  - field: county_role
    type: categorical
    label: Role (subject/peer)
  - field: wellbore_profile
    type: categorical
    label: Wellbore profile
  - field: status
    type: categorical
    label: Status
  - field: oil_gas
    type: categorical
    label: Oil/Gas
  - field: district
    type: categorical
    label: District
  - field: total_depth
    type: numeric
    label: Total depth (ft)
    quick_presets: &id001
    - label: <5K
      min: 0
      max: 5000
    - label: 5-10K
      min: 5000
      max: 10000
    - label: 10-15K
      min: 10000
      max: 15000
    - label: '>15K'
      min: 15000
      max: 30000
  - field: permit_year
    type: numeric
    label: Permit year (1976-present once Round 2.5 backfill ships; 2018-present today)
    quick_presets:
    - label: 1976-1980
      min: 1976
      max: 1980
    - label: 1981-1985
      min: 1981
      max: 1985
    - label: 1986-1990
      min: 1986
      max: 1990
    - label: 1991-1995
      min: 1991
      max: 1995
    - label: 1996-2000
      min: 1996
      max: 2000
    - label: 2001-2005
      min: 2001
      max: 2005
    - label: 2006-2010
      min: 2006
      max: 2010
    - label: 2011-2015
      min: 2011
      max: 2015
    - label: 2016-2020
      min: 2016
      max: 2020
    - label: 2021-2025
      min: 2021
      max: 2025
    - label: 2026+
      min: 2026
      max: 2030
