layers:
- id: counties
  file: combined_geoms.geojson
  geom: line
  group: Reference
  label: Counties (outline)
  color: '#64748b'
  default_on: true
  popup:
  - NAME
  tippecanoe:
  - -zg
  - --coalesce-densest-as-needed
  - --simplification=8
- id: cities
  file: combined_points.csv
  geom: point
  group: Reference
