  geom: line
  group: Reference
  label: Counties (Outline)
  color: '#fbbf24'
  line_width: 1.25
  default_on: true
  popup:
  - NAME
  - GEOID
  tippecanoe:
  - -zg
  - --extend-zooms-if-still-dropping
