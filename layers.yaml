- id: wells
  file: combined_points.csv
  geom: point
  group: Water & Regulatory
  label: TWDB wells
  color: '#a855f7'
  default_on: false
  min_zoom: 6
  radius: 2.5
  popup:
  - name
  - county
  - depth_ft
  - use
  - aquifer
